        specifier: workspace:*
        version: link:../agent-sdk
      '@iamrobot/protocol':
        specifier: workspace:*
        version: link:../protocol
      '@iamrobot/verification':
        specifier: workspace:*
        version: link:../verification

  packages/protocol: {}

  packages/ui:
    dependencies:
      '@iamrobot/protocol':
